<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>
        NEET Biology AI Portal
    </title>

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="Style.css"
    />

    <!-- Database -->
    <script src="data.js"></script>

</head>

<body>

    <div class="container">

        <!-- HEADER -->
        <header>

            <h1>
                NEET Biology 10,000 PYQs Quest
            </h1>

            <p>
                Adaptive Online Self-Assessment System
            </p>

        </header>

        <!-- CONTROLS -->
        <div class="controls">

            <!-- Chapter -->
            <div>

                <span>
                    Select Chapter:
                </span>

                <select id="chapterSelector">

                    <option value="Cell: The Unit of Life">
                        Cell Biology
                    </option>

                    <option value="Molecular Basis of Inheritance">
                        Molecular Biology
                    </option>

                    <option value="Principles of Inheritance and Variation">
                        Genetics
                    </option>

                    <option value="Photosynthesis in Higher Plants">
                        Photosynthesis
                    </option>

                </select>

            </div>

            <!-- Question Count -->
            <div>

                <span>
                    Question Quantity:
                </span>

                <select id="questionCount">

                    <option value="5">
                        5
                    </option>

                    <option value="10">
                        10
                    </option>

                    <option value="20">
                        20
                    </option>

                </select>

            </div>

            <!-- AI BUTTON -->
            <div>

                <button
                    class="reveal-btn"
                    onclick="generateAIQuestions()"
                >
                    Generate AI Questions
                </button>

            </div>

        </div>

        <!-- QUESTIONS -->
        <div id="questions-viewport">

            Loading Questions...

        </div>

        <!-- ANSWERS -->
        <div class="action-zone">

            <button
                class="reveal-btn"
                onclick="toggleAnswers()"
            >
                View Answer Sheet
            </button>

            <div
                class="answer-sheet"
                id="answerSheetBox"
            >

                <h2>
                    Official Verification Sheet
                </h2>

                <p>
                    Cross-check answers below
                </p>

                <div
                    class="ans-grid"
                    id="answers-viewport"
                >
                </div>

            </div>

        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script>

        /* ===============================
           AI QUESTION GENERATOR
        =============================== */

        async function generateAIQuestions() {

            const chapter =
                document.getElementById(
                    "chapterSelector"
                ).value;

            const count =
                parseInt(
                    document.getElementById(
                        "questionCount"
                    ).value
                );

            // PUT NEW API KEY HERE
            const apiKey =
                "PASTE_NEW_API_KEY";

            const prompt = `
Generate ${count} NEET Biology MCQs
from chapter "${chapter}".

Return ONLY valid JSON array.

Format:

[
  {
    "question": "Question text",
    "options": [
      "Option A",
      "Option B",
      "Option C",
      "Option D"
    ],
    "answer": "Correct option"
  }
]
`;

            try {

                const response =
                    await fetch(

                        "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + apiKey,

                        {
                            method: "POST",

                            headers: {
                                "Content-Type":
                                    "application/json"
                            },

                            body: JSON.stringify({

                                contents: [

                                    {
                                        parts: [
                                            {
                                                text: prompt
                                            }
                                        ]
                                    }
                                ]
                            })
                        }
                    );

                const data =
                    await response.json();

                console.log(data);

                const rawText =
                    data.candidates[0]
                    .content.parts[0].text;

                const cleanedText =
                    rawText
                    .replace(/```json/g, "")
                    .replace(/```/g, "")
                    .trim();

                const aiQuestions =
                    JSON.parse(cleanedText);

                renderAIQuestions(aiQuestions);

            }

            catch(error) {

                console.error(error);

                alert(
                    "AI generation failed"
                );
            }
        }

        /* ===============================
           RENDER AI QUESTIONS
        =============================== */

        function renderAIQuestions(questionList) {

            const qViewport =
                document.getElementById(
                    "questions-viewport"
                );

            const aViewport =
                document.getElementById(
                    "answers-viewport"
                );

            qViewport.innerHTML = "";

            aViewport.innerHTML = "";

            questionList.forEach((q, index) => {

                qViewport.innerHTML += `

                    <div class="q-card">

                        <div class="q-meta">

                            AI Question
                            ${index + 1}

                        </div>

                        <div class="q-text">

                            ${q.question}

                        </div>

                        <div class="options-grid">

                            ${q.options.map(option => `

                                <div
                                    class="option-item"

                                    onclick="
                                        checkAnswer(
                                            this,
                                            '${option}',
                                            '${q.answer}'
                                        )
                                    "
                                >

                                    ${option}

                                </div>

                            `).join("")}

                        </div>

                    </div>
                `;

                aViewport.innerHTML += `

                    <div class="ans-pill">

                        Q${index + 1}:
                        ${q.answer}

                    </div>
                `;
            });
        }

        /* ===============================
           CHECK ANSWER
        =============================== */

        function checkAnswer(
            element,
            selected,
            correct
        ) {

            const parent =
                element.parentElement;

            const allOptions =
                parent.querySelectorAll(
                    ".option-item"
                );

            allOptions.forEach(opt => {

                opt.style.pointerEvents =
                    "none";

                if (
                    opt.innerText.includes(
                        correct
                    )
                ) {

                    opt.style.background =
                        "#c8e6c9";

                    opt.style.border =
                        "2px solid green";
                }
            });

            if (
                selected === correct
            ) {

                element.style.background =
                    "#a5d6a7";

                element.innerHTML +=
                    " ✅ Correct";

            }

            else {

                element.style.background =
                    "#ffcdd2";

                element.innerHTML +=
                    " ❌ Wrong";
            }
        }

        /* ===============================
           TOGGLE ANSWERS
        =============================== */

        function toggleAnswers() {

            const box =
                document.getElementById(
                    "answerSheetBox"
                );

            if (
                box.style.display ===
                "block"
            ) {

                box.style.display =
                    "none";
            }

            else {

                box.style.display =
                    "block";

                box.scrollIntoView({
                    behavior: "smooth"
                });
            }
        }

    </script>

</body>

</html>
